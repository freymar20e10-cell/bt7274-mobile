<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0f1a">
    <title>BT-7274</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00d4ff;
            --bg: #0a0f1a;
            --bg2: #0d1525;
            --border: #1a2a40;
            --text: #e0e8f0;
            --dim: #4a6080;
            --success: #00ff88;
        }
        body {
            font-family: -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
        }
        .header h1 { font-size: 1rem; color: var(--primary); letter-spacing: 2px; }
        .header .status {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.7rem; color: var(--success);
        }
        .header .status::before {
            content: ''; width: 6px; height: 6px;
            background: var(--success); border-radius: 50%;
            box-shadow: 0 0 6px var(--success);
        }
        .messages {
            flex: 1; overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .msg {
            max-width: 85%; padding: 10px 14px; border-radius: 16px;
            font-size: 0.9rem; line-height: 1.4; animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .msg-user {
            align-self: flex-end;
            background: rgba(0, 212, 255, 0.15);
            border: 1px solid var(--primary);
            border-bottom-right-radius: 4px;
        }
        .msg-bot {
            align-self: flex-start;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .msg-bot .label { font-size: 0.65rem; color: var(--primary); margin-bottom: 4px; font-weight: 600; }
        .typing { display: flex; gap: 4px; padding: 8px 0; }
        .typing span { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; animation: bounce 1.4s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }
        .input-area {
            display: flex; gap: 8px; padding: 12px 16px;
            background: var(--bg2); border-top: 1px solid var(--border);
        }
        .input-area input {
            flex: 1; background: var(--bg); border: 1px solid var(--border);
            border-radius: 24px; padding: 12px 18px; color: var(--text);
            font-size: 0.9rem; outline: none;
        }
        .input-area input:focus { border-color: var(--primary); }
        .input-area button {
            width: 44px; height: 44px; border-radius: 50%; border: none;
            background: var(--primary); color: var(--bg); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .input-area button:active { transform: scale(0.95); }
        .voice-btn { background: transparent !important; border: 1px solid var(--border) !important; color: var(--primary) !important; }
        .voice-btn.active { background: var(--success) !important; color: var(--bg) !important; border-color: var(--success) !important; }
        .quick-actions { display: flex; gap: 8px; padding: 8px 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .quick-btn {
            flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
            background: var(--bg2); border: 1px solid var(--border);
            color: var(--dim); font-size: 0.75rem; cursor: pointer;
        }
        .quick-btn:active { border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body>
    <header class="header">
        <h1>BT-7274</h1>
        <span class="status">EN LÍNEA</span>
    </header>

    <div class="quick-actions">
        <button class="quick-btn" onclick="send('¿Cómo está el clima?')">🌤️ Clima</button>
        <button class="quick-btn" onclick="send('¿Qué hora es?')">🕐 Hora</button>
        <button class="quick-btn" onclick="send('Dame noticias')">📰 Noticias</button>
        <button class="quick-btn" onclick="send('Mis notas')">📝 Notas</button>
        <button class="quick-btn" onclick="openSpotify()">🎵 Spotify</button>
    </div>

    <div class="messages" id="messages">
        <div class="msg msg-bot">
            <div class="label">BT-7274</div>
            En línea, Piloto. Modo móvil activo. ¿En qué te ayudo?
        </div>
    </div>

    <div class="input-area">
        <button class="voice-btn" id="voice-btn" onclick="toggleVoice()">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12,2A3,3 0 0,1 15,5V11A3,3 0 0,1 12,14A3,3 0 0,1 9,11V5A3,3 0 0,1 12,2M19,11C19,14.53 16.39,17.44 13,17.93V21H11V17.93C7.61,17.44 5,14.53 5,11H7A5,5 0 0,0 12,16A5,5 0 0,0 17,11H19Z"/></svg>
        </button>
        <input type="text" id="input" placeholder="Mensaje..." autocomplete="off">
        <button onclick="sendInput()">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M2,21L23,12L2,3V10L17,12L2,14V21Z"/></svg>
        </button>
    </div>

    <script>
        const API_URL = 'https://bt7274-mobile.onrender.com';
        const sessionId = 'mobile-' + Date.now();

        // ═══ TTS (Voz del navegador — gratis, sin API) ═══
        function speakText(text) {
            if ('speechSynthesis' in window) {
                // Limpiar emojis y símbolos
                const clean = text.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{2B55}\u{200d}\u{23cf}\u{23e9}\u{231a}\u{fe0f}═╔╗╚╝╠╣║✅❌⚠️📋📅⏰🔍📰🌤️🕐📝🎵💬🧠📊🔴🟡🟢⬜●○🎤🔇⌨️🫡💡📖📚🌐🎬⏸️▶️⏮⏭🔊🔀🔁💿📁📄📦✏️🗑️🗂️📂]/gu, '');
                
                if (!clean.trim()) return;
                
                window.speechSynthesis.cancel();
                const utter = new SpeechSynthesisUtterance(clean.slice(0, 300));
                utter.lang = 'es-ES';
                utter.rate = 1.05;
                utter.pitch = 0.9;
                
                // Intentar usar una voz masculina en español
                const voices = window.speechSynthesis.getVoices();
                const esVoice = voices.find(v => v.lang.startsWith('es') && v.name.toLowerCase().includes('male')) 
                    || voices.find(v => v.lang.startsWith('es'));
                if (esVoice) utter.voice = esVoice;
                
                window.speechSynthesis.speak(utter);
            }
        }

        // Cargar voces
        if ('speechSynthesis' in window) {
            speechSynthesis.getVoices();
            speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
        }

        // ═══ CHAT ═══
        function sendInput() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text) return;
            send(text);
            input.value = '';
        }

        async function send(text) {
            addMsg('user', text);
            showTyping();

            try {
                const res = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, session_id: sessionId })
                });
                const data = await res.json();
                removeTyping();
                addMsg('bot', data.response);
                speakText(data.response);

                // Detectar si BT menciona Spotify
                if (data.response.toLowerCase().includes('spotify')) {
                    detectSpotifyAction(data.response);
                }
            } catch (e) {
                removeTyping();
                addMsg('bot', '❌ Sin conexión. Espera 30 segundos (el servidor se está despertando) e intenta de nuevo.');
            }
        }

        function addMsg(role, text) {
            const div = document.createElement('div');
            div.className = `msg msg-${role}`;
            if (role === 'bot') {
                div.innerHTML = `<div class="label">BT-7274</div>${text.replace(/\n/g, '<br>')}`;
            } else {
                div.textContent = text;
            }
            document.getElementById('messages').appendChild(div);
            scrollBottom();
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'msg msg-bot typing-msg';
            div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            document.getElementById('messages').appendChild(div);
            scrollBottom();
        }

        function removeTyping() {
            const el = document.querySelector('.typing-msg');
            if (el) el.remove();
        }

        function scrollBottom() {
            const m = document.getElementById('messages');
            m.scrollTop = m.scrollHeight;
        }

        // ═══ SPOTIFY (Deep Links para Android) ═══
        function openSpotify() {
            window.location.href = 'spotify://';
        }

        function detectSpotifyAction(text) {
            const lower = text.toLowerCase();
            // Detectar si menciona reproducir algo
            const match = text.match(/[""\"](.*?)[""\"]/);
            if (match && (lower.includes('reproduciendo') || lower.includes('poniendo'))) {
                const query = match[1];
                // Abrir búsqueda en Spotify app
                window.location.href = `spotify:search:${encodeURIComponent(query)}`;
            }
        }

        function playOnSpotify(query) {
            window.location.href = `spotify:search:${encodeURIComponent(query)}`;
        }

        // ═══ VOICE (Web Speech API — reconocimiento) ═══
        let isListening = false;
        let recognition = null;

        function toggleVoice() {
            if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
                addMsg('bot', '❌ Tu navegador no soporta reconocimiento de voz. Usa Chrome.');
                return;
            }

            const btn = document.getElementById('voice-btn');

            if (isListening) {
                recognition.stop();
                isListening = false;
                btn.classList.remove('active');
                return;
            }

            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SR();
            recognition.lang = 'es-ES';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => { isListening = true; btn.classList.add('active'); };
            recognition.onresult = (e) => { send(e.results[0][0].transcript); };
            recognition.onerror = () => { isListening = false; btn.classList.remove('active'); };
            recognition.onend = () => { isListening = false; btn.classList.remove('active'); };

            recognition.start();
        }

        // Enter key
        document.getElementById('input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendInput();
        });

        // PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
